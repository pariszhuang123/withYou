name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  analyze:
    name: Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: stable
          cache: true
      - run: flutter pub get
      - run: flutter analyze --fatal-infos

  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: stable
          cache: true
      - run: flutter pub get
      - run: flutter test --coverage
      - name: Check coverage threshold
        run: |
          sudo apt-get update
          sudo apt-get install -y lcov
          COVERAGE=$(lcov --summary coverage/lcov.info 2>&1 | grep 'lines' | grep -oP '[\d.]+(?=%)')
          echo "Line coverage: $COVERAGE%"
          if (( $(echo "$COVERAGE < 80" | bc -l) )); then
            echo "::error::Coverage $COVERAGE% is below 80% threshold"
            exit 1
          fi
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/lcov.info

  build:
    name: Build ${{ matrix.flavor }}
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - flavor: dev
          - flavor: prod
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: stable
          cache: true
      - run: flutter pub get
      - name: Create env file
        shell: bash
        run: |
          mkdir -p env
          cat > env/${{ matrix.flavor }}.json <<EOF
          {
            "APP_ENV": "${{ matrix.flavor }}"
          }
          EOF
      - run: flutter build apk --release --flavor=${{ matrix.flavor }} --target=lib/main.dart --dart-define-from-file=env/${{ matrix.flavor }}.json
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.flavor }}-apk
          path: build/app/outputs/flutter-apk/app-${{ matrix.flavor }}-release.apk
